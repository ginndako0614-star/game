<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>残機何機？</title>
<style>
body {
  font-family: sans-serif;
  text-align:center;
  background:#111;
  color:white;
}
button {
  font-size:18px;
  padding:10px;
  margin:5px;
}
</style>
</head>
<body>

<h1>残機何機？</h1>

<div id="setup">
  <p>人数</p>
  <input id="playerCount" type="number" value="3">
  <button onclick="startGame()">スタート</button>
</div>

<div id="game" style="display:none;">
  <h2 id="turn"></h2>
  <button onclick="guess('♠')">♠</button>
  <button onclick="guess('♥')">♥</button>
  <button onclick="guess('♦')">♦</button>
  <button onclick="guess('♣')">♣</button>
</div>

<script>
let players=[], deck=[], turn=0;

function startGame(){
  const count = document.getElementById("playerCount").value;
  players = Array.from({length:count}, (_,i)=>({p:500,n:"P"+(i+1)}));

  deck=[];
  ["♠","♥","♦","♣"].forEach(s=>{
    for(let i=0;i<13;i++) deck.push(s);
  });

  deck.sort(()=>Math.random()-0.5);

  document.getElementById("setup").style.display="none";
  document.getElementById("game").style.display="block";

  update();
}

function guess(g){
  let d = deck.pop();
  let p = players[turn];

  if(g===d){ p.p+=100 } else { p.p-=100 }

  if(p.p<=0 || deck.length===0){
    alert("ゲーム終了");
    location.reload();
    return;
  }

  turn = (turn+1)%players.length;
  update();
}

function update(){
  document.getElementById("turn").innerText = players[turn].n + "の番";
}
</script>

</body>
</html>
