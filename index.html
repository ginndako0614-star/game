<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>残機何機？</title>

<style>
body {
  margin:0;
  font-family:"Courier New", monospace;
  background:#000;
  color:#00ff99;
  text-align:center;
}

.container {
  max-width:420px;
  margin:0 auto;
  padding:20px;
}

.title {
  font-size:40px;
  color:#ffcc00;
  text-shadow:3px 3px #ff0066;
}

.box {
  border:2px solid #00ff99;
  padding:15px;
  margin:15px 0;
}

button {
  font-size:18px;
  padding:10px;
  margin:5px;
  background:#111;
  color:#ffcc00;
  border:2px solid #ffcc00;
}

input {
  font-size:18px;
  margin:5px;
  padding:5px;
  width:80%;
}

.hidden { display:none; }

.suit {
  font-size:28px;
  width:70px;
  height:60px;
}

.player, .result {
  border:1px solid #00ff99;
  margin:5px;
  padding:5px;
}

.winner {
  color:#ffcc00;
  font-size:22px;
}
</style>
</head>

<body>

<audio id="bgm" src="bgm.mp3" loop></audio>

<div class="container">

<div id="start">
  <h1 class="title">残機何機？</h1>

  <div class="box">
    <p>人数入力</p>
    <input id="count" type="number" value="3">
    <br>
    <button onclick="createNames()">次へ</button>
  </div>

  <div id="namesBox" class="box hidden">
    <div id="names"></div>
    <button onclick="startGame()">ゲーム開始</button>
  </div>
</div>

<div id="game" class="hidden">
  <h1 class="title">残機何機？</h1>

  <div class="box">
    <h2 id="turn"></h2>
    <p id="deck"></p>

    <button class="suit" onclick="guess('♠')">♠</button>
    <button class="suit" onclick="guess('♥')">♥</button>
    <button class="suit" onclick="guess('♦')">♦</button>
    <button class="suit" onclick="guess('♣')">♣</button>
  </div>

  <div class="box">
    <div id="players"></div>
  </div>
</div>

<div id="result" class="hidden">
  <h1 class="title">RESULT</h1>

  <div id="resultText"></div>

  <div class="box">

    <p>🎧 音源</p>
    <a href="https://www.tunecore.co.jp/artists?id=912693" target="_blank">
      ▶ 大志の音源を聴く
    </a>

    <p style="margin-top:15px;">💰 サポート</p>
    <a href="https://paypay.onelink.me/EUKm?pid=QRCode&link_key=https%3A%2F%2Fqr.paypay.ne.jp%2Fp2p01_IUmQGm0IxrWFLs0U&af_dp=paypay%3A%2F%2Fpayment&af_ios_url=https%3A%2F%2Fpaypay.ne.jp%2F&af_android_url=https%3A%2F%2Fpaypay.ne.jp%2F&af_web_dp=https%3A%2F%2Fpaypay.ne.jp%2F&af_force_deeplink=true" target="_blank">
      ▶ 投げ銭する
    </a>

  </div>

  <button onclick="location.reload()">もう一回</button>
</div>

</div>

<script>
let players=[], deck=[], turnIndex=0;

function createNames(){
  let count = document.getElementById("count").value;
  let html = "";

  for(let i=1;i<=count;i++){
    html += `<input id="name${i}" placeholder="Player ${i}"><br>`;
  }

  document.getElementById("names").innerHTML = html;
  document.getElementById("namesBox").classList.remove("hidden");
}

function startGame(){
  let count = document.getElementById("count").value;

  players=[];
  for(let i=1;i<=count;i++){
    let name = document.getElementById("name"+i).value || "Player "+i;
    players.push({name:name, point:500});
  }

  deck=[];
  ["♠","♥","♦","♣"].forEach(s=>{
    for(let i=0;i<13;i++) deck.push(s);
  });

  deck.sort(()=>Math.random()-0.5);

  document.getElementById("start").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");

  document.getElementById("bgm").play();

  update();
}

function guess(g){
  let d = deck.pop();
  let p = players[turnIndex];

  if(g===d){ p.point+=100; }
  else{ p.point-=100; }

  if(p.point<=0 || deck.length==0){
    showResult();
    return;
  }

  turnIndex=(turnIndex+1)%players.length;
  update();
}

function update(){
  document.getElementById("turn").innerText = players[turnIndex].name + "の番";
  document.getElementById("deck").innerText = "残り："+deck.length;

  let html="";
  players.forEach(p=>{
    html += `<div class="player">${p.name}：${p.point}</div>`;
  });

  document.getElementById("players").innerHTML = html;
}

function showResult(){
  document.getElementById("game").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  document.getElementById("bgm").pause();

  let rank=[...players].sort((a,b)=>b.point-a.point);

  let html="";
  rank.forEach((p,i)=>{
    let cls = i===0 ? "winner" : "";
    html += `<div class="result ${cls}">${i+1}位 ${p.name}：${p.point}</div>`;
  });

  document.getElementById("resultText").innerHTML = html;
}
</script>

</body>
</html>
